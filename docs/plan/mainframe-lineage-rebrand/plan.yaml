plan_id: mainframe-lineage-rebrand
objective: |
  Rebrand the application from "Marquito" to "Mainframe Lineage Viewer".
  Make the mainframe page the default landing page.
  Hide OpenLineage and Fabric Livy navigation links behind a hidden/collapsed menu.
  Add credit to Marquito/OpenLineage in the footer.
created_at: "2026-04-12"
created_by: gem-planner
status: completed
research_confidence: high

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 4
  risk_score: low

tldr: |
  Rebrand completo em 5 tarefas organizadas em 2 waves:
  Wave 1 (paralela): Atualiza metadata/package.json, reescreve Header com nav oculta,
  reescreve Footer com crédito ao Marquito, e faz "/" redirecionar para /mainframe.
  Wave 2: Build + verificação final de todas as mudanças integradas.

open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "Links de navegação ocultos ficam completamente inacessíveis"
      likelihood: low
      impact: medium
      mitigation: "Manter links funcionais mas com visibilidade reduzida (ex: menu '...' ou seção 'Mais' colapsável)"
    - scenario: "Redirect de '/' para '/mainframe' quebra static export do Next.js"
      likelihood: medium
      impact: high
      mitigation: "Usar page.tsx de '/' com redirect client-side via useEffect + router.replace ao invés de server redirect"
  assumptions:
    - "O app usa Next.js 15 com output: 'export' (static site generation)"
    - "A rota /openlineage aponta para o page.tsx raiz (/) — não existe /openlineage/page.tsx"
    - "Header e Footer são componentes únicos usados no layout.tsx raiz"

implementation_specification:
  code_structure: |
    Modificações pontuais em arquivos existentes. Nenhum componente novo é necessário.
    O Header será reestruturado para mostrar apenas "Mainframe" visível e agrupar
    OpenLineage + Fabric Livy em um submenu discreto ou com opacity muito baixa.
    O Footer terá texto rebrandado e crédito ao Marquito.
    O page.tsx raiz fará redirect para /mainframe.
  affected_areas:
    - marquito/src/components/Header.tsx
    - marquito/src/components/Footer.tsx
    - marquito/src/app/layout.tsx
    - marquito/src/app/page.tsx
    - marquito/package.json
  component_details:
    - component: Header
      responsibility: "Exibir nome 'Mainframe Lineage Viewer', nav com Mainframe visível, OpenLineage e Fabric Livy ocultos"
      interfaces:
        - "Nav link 'Mainframe' como principal"
        - "Links OpenLineage e Fabric Livy acessíveis via menu '⋯ Mais' ou opacity reduzida"
    - component: Footer
      responsibility: "Exibir 'Mainframe Lineage Viewer' com crédito 'Baseado no Marquito / OpenLineage'"
      interfaces:
        - "Texto de crédito com links para Marquito e OpenLineage"
    - component: "Root page (/)"
      responsibility: "Redirecionar para /mainframe como página principal"
      interfaces:
        - "Client-side redirect via router.replace('/mainframe')"
    - component: layout.tsx
      responsibility: "Metadata atualizada com novo nome e descrição"
      interfaces:
        - "title: 'Mainframe Lineage Viewer'"
  dependencies:
    - component: Header
      relationship: "Importado e renderizado pelo layout.tsx raiz"
    - component: Footer
      relationship: "Importado e renderizado pelo layout.tsx raiz"
  integration_points:
    - "layout.tsx renderiza Header e Footer — mudanças afetam todas as rotas"
    - "page.tsx raiz (/) — redirect impacta a rota inicial"
    - "next.config.mjs com output: 'export' — restringe uso de middleware/redirects server-side"

contracts:
  - from_task: T1
    to_task: T5
    interface: "Metadata e package.json atualizados"
    format: "Arquivos JSON e TSX"
  - from_task: T2
    to_task: T5
    interface: "Header rebrandado com nav oculta"
    format: "Componente TSX"
  - from_task: T3
    to_task: T5
    interface: "Footer rebrandado com crédito"
    format: "Componente TSX"
  - from_task: T4
    to_task: T5
    interface: "Redirect de / para /mainframe funcionando"
    format: "Componente TSX com useEffect"

