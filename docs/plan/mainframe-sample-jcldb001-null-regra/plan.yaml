      - path: generated/mainframe-extractor/JCLDB001/importar/column_mappings.csv
        description: "Mappings de E006 para E007 que precisam carregar o campo como identidade"
      - path: generated/mainframe-extractor/JCLDB001/importar/transform_rules.csv
        description: "Regra condicional final que deve alimentar o campo na tabela de saida"
    estimated_effort: medium
