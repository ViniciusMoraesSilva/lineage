plan_id: mainframe-sample-jcldb001-null-regra
objective: |
  Evoluir a amostra carregada pelo botao "Carregar amostra JCLDB001" para incluir
  um caso demonstrativo em que um campo nasce sem upstream real em uma tabela,
  trafega como nao preenchido para a tabela seguinte e, nessa tabela seguinte,
  passa a ser alimentado por uma regra condicional. O resultado esperado e que
  o viewer mostre claramente o contraste entre o estado "unfilled" na etapa
  intermediaria e o estado resolvido na etapa final.
created_at: "2026-04-13"
created_by: gem-planner
status: completed
research_confidence: medium

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 5
  risk_score: medium

tldr: |
  Plano medio em 5 tarefas e 4 waves. Primeiro modelar o cenario didatico no
  bundle canonico JCLDB001 de origem, definindo um campo demonstrativo que fica
  sem upstream em &&TMPOUT03 e e copiado para a saida final com uma regra
  condicional adicional que o preenche. Depois espelhar os CSVs para
  public/mainframe-sample, documentar que o caso e demonstrativo e nao uma
  leitura literal do COBOL/JCL, adicionar teste de regressao e validar a
  experiencia real no viewer.

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "A amostra publica divergir do bundle canonico em generated e o botao carregar um comportamento diferente do esperado"
      likelihood: medium
      impact: high
      mitigation: "Tratar generated/mainframe-extractor/JCLDB001/importar como fonte canonica e espelhar a mesma mudanca em public/mainframe-sample na mesma entrega"
    - scenario: "O novo campo demonstrativo parecer comportamento real extraido do COBOL e gerar interpretacao errada em apresentacoes"
      likelihood: medium
      impact: medium
      mitigation: "Documentar explicitamente que o campo e didatico e existe para demonstrar o estado unfilled seguido de preenchimento condicional"
    - scenario: "A regra condicional nao criar uma origem resolvida no grafo e o campo continuar laranja na etapa final"
      likelihood: low
      impact: high
      mitigation: "Modelar a regra final como condicional com literal, permitindo a criacao da origem sintetica HARD_CODE ja suportada pelo parser"
  assumptions:
    - "O objetivo e alterar a amostra estatica do viewer, nao reescrever o JCL ou o COBOL reais do bundle base"
    - "O viewer ja suporta a semantica de campo unfilled que volta a ficar resolvido quando um upstream valido aparece"
    - "MainframeBundlePicker le diretamente os CSVs em public/mainframe-sample e nao existe sincronizacao automatica a partir de generated"
    - "Nao ha docs/PRD.yaml no repositorio; o prompt do usuario e a fonte de verdade para o escopo desta mudanca"

implementation_specification:
  code_structure: |
    A mudanca deve permanecer no nivel do bundle canonico da amostra e da sua
    copia publica. O cenario recomendado e introduzir um campo demonstrativo com
    o mesmo nome em E006 (&&TMPOUT03) e E007 (APP.ARQ.SAIDA.CBLDB001). Em E006,
    o campo existe no schema, mas nao recebe nenhum mapping upstream e por isso
    permanece "unfilled". Em E007, o campo recebe uma copia identidade a partir
    de E006 e, adicionalmente, uma regra condicional com literal do tipo
    "se estiver vazio, preencher com valor demonstrativo". Essa regra deve ser
    modelada de forma que o parser gere a origem sintetica HARD_CODE, permitindo
    ao viewer resolver o campo na tabela final sem exigir alteracao estrutural no
    parser ou no grafo.
  affected_areas:
    - generated/mainframe-extractor/JCLDB001/importar/entity_columns.csv
    - generated/mainframe-extractor/JCLDB001/importar/column_mappings.csv
    - generated/mainframe-extractor/JCLDB001/importar/transform_rules.csv
    - mainframe-lineage-viewer/public/mainframe-sample/entity_columns.csv
    - mainframe-lineage-viewer/public/mainframe-sample/column_mappings.csv
    - mainframe-lineage-viewer/public/mainframe-sample/transform_rules.csv
    - mainframe-lineage-viewer/__tests__
    - docs/mainframe-lineage-viewer-v1.md
  component_details:
    - component: Bundle canonico JCLDB001
      responsibility: "Definir o campo demonstrativo, o mapping de propagacao e a regra condicional de preenchimento"
      interfaces:
        - "entity_columns.csv com o campo demonstrativo em E006 e E007"
        - "column_mappings.csv com a propagacao identidade de E006 para E007"
        - "transform_rules.csv com regra condicional capaz de sintetizar upstream HARD_CODE"
    - component: Amostra publica do viewer
      responsibility: "Servir ao botao Carregar amostra JCLDB001 exatamente o mesmo conteudo planejado no bundle canonico"
      interfaces:
        - "Arquivos CSV em public/mainframe-sample sincronizados com o bundle de origem"
    - component: Regressao automatizada
      responsibility: "Garantir que o campo aparece como unfilled na tabela intermediaria e resolvido na final"
      interfaces:
        - "Teste Jest lendo a amostra publica e validando parseCanonicalBundle + computeColumnFieldLineageStatus"
    - component: Documentacao funcional da amostra
      responsibility: "Explicar que o exemplo e didatico e descrever a narrativa nulo -> trafega -> regra condicional preenche"
      interfaces:
        - "Trecho de documentacao que distinga cenario demonstrativo de extração fiel do codigo fonte"
  dependencies:
    - component: MainframeBundlePicker
      relationship: "Busca diretamente os CSVs de public/mainframe-sample ao acionar o botao de amostra"
    - component: parseCanonicalBundle
      relationship: "Converte column_mappings e transform_rules em edges, regras de campo e origem sintetica HARD_CODE"
    - component: computeColumnFieldLineageStatus
      relationship: "Marca campos como unfilled quando nao ha upstream resolvido e como resolved quando surge qualquer upstream valido"
    - component: ColumnLineage
      relationship: "Ja diferencia visualmente caminhos unfilled e rotula transformacoes condicionais no grafo"
  integration_points:
    - "generated/mainframe-extractor/JCLDB001/importar e a representacao canonica que deve permanecer alinhada com a copia deployavel"
    - "mainframe-lineage-viewer/public/mainframe-sample e a fonte efetivamente carregada pela UI"
    - "transform_rules.csv pode gerar edges de HARD_CODE sem mapeamento explicito em column_mappings quando a regra e classificada como constante condicional"
    - "A experiencia final precisa ser verificavel tanto por teste automatizado quanto pela interacao no /mainframe"

