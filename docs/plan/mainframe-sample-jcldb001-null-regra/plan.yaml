      para introduzir um campo demonstrativo de preenchimento tardio. O campo deve
      existir em E006 e E007 com o mesmo nome. Em E006 ele nao deve receber nenhum
      upstream real, para que o viewer o trate como unfilled. Em E007 ele deve
      receber uma aresta de copia identidade a partir de E006 e uma regra
      condicional adicional do tipo "se vazio entao preencher com literal
      demonstrativo", permitindo que o parser sintetize a origem HARD_CODE e
      marque a coluna final como resolvida.
    wave: 1
    agent: gem-implementer
    priority: high
    status: completed
    dependencies: []
    conflicts_with: []
