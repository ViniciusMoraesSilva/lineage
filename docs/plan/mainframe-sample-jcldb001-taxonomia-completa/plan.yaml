plan_id: mainframe-sample-jcldb001-taxonomia-completa
objective: |
  Recriar a amostra carregada pelo botao "Carregar amostra JCLDB001" para que
  ela vire uma vitrine didatica clara, simples e completa do viewer. A nova
  amostra deve cobrir explicitamente todos os 10 subtipos padronizados de
  transformacao (`copia_identidade`, `reordenacao_registro`,
  `copia_enriquecimento_registro`, `busca_valor`, `uso_chave_busca`,
  `calculo_derivado`, `derivacao_condicional`, `constante_condicional`,
  `constante_literal`, `nao_classificada`) e tambem os cenarios visuais de
  campos sem upstream real: campo que nasce nao preenchido, continua nao
  preenchido em etapa seguinte, e campo que volta a ficar resolvido quando uma
  regra ou origem real finalmente o alimenta. A trilha null deve permanecer
  contratada como narrativa de status em coluna dedicada (`null_status`), sem
  introduzir novos valores de `rule_subtype` fora da taxonomia padronizada.
created_at: "2026-04-14"
created_by: gem-planner
status: completed
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 7
  risk_score: high

tldr: |
  Plano complexo em 6 tarefas e 5 waves. Primeiro definir uma matriz didatica
  unica para a amostra JCLDB001, com uma familia de campos DEMO que separe de
  forma visual cada subtipo de transformacao e outra trilha dedicada aos casos
  null/unfilled. Depois remodelar o bundle canonico para introduzir esses
  campos e regras sem poluir a narrativa dos campos reais de negocio. Em
  seguida espelhar o resultado na copia publica servida pela UI, adicionar
  testes de regressao que comprovem cobertura da taxonomia e estados
  unfilled/resolved, atualizar a documentacao de apresentacao e por fim validar
  no navegador que cada filtro de transformacao e cada cenario nulo ficam
  imediatamente legiveis em tela. A matriz contratual de T1 deve separar
  explicitamente `rule_subtype` e `null_status` para que T2 nao materialize
  subtipos inexistentes no viewer.

open_questions: []

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: "Os exemplos didaticos ficarem amontoados no mesmo grupo de campos e o usuario continuar sem conseguir isolar rapidamente cada subtipo no viewer"
      likelihood: medium
      impact: high
      mitigation: "Reservar uma familia explicita de campos com prefixo DEMO e distribuir um ou dois campos por subtipo, sem reaproveitar o mesmo alvo para significados diferentes"
    - scenario: "A amostra publica divergir do bundle canonico e o botao carregar uma versao diferente da planejada"
      likelihood: medium
      impact: high
      mitigation: "Manter generated/mainframe-extractor/JCLDB001/importar como fonte canonica, espelhar a mesma mudanca em public/mainframe-sample e reforcar os testes de sincronizacao"
    - scenario: "Os cenarios null/unfilled usarem regras que acabam criando upstream sintetico cedo demais e o campo nao permanecer laranja onde deveria"
      likelihood: medium
      impact: critical
      mitigation: "Separar os casos de null em trilhas distintas: um campo sem mapping real na etapa intermediaria, um campo propagado ainda vazio, e um campo resolvido apenas na etapa em que a regra final ou o lookup real aparece"
    - scenario: "A cobertura de todos os 10 subtipos exigir reescrever o fluxo real e a amostra deixar de parecer JCLDB001"
      likelihood: low
      impact: high
      mitigation: "Preservar a espinha dorsal do fluxo real e concentrar a didatica adicional em campos DEMO claramente rotulados como demonstrativos"
  assumptions:
    - "O objetivo e melhorar a amostra didatica servida pelo viewer, nao reescrever os artefatos reais de JCLDB001"
    - "A UI ja possui filtros por transformacao e visualizacao de status de campos suficientes para explorar uma amostra mais rica sem alterar componentes React"
    - "O bundle canonico em generated/mainframe-extractor/JCLDB001/importar continua sendo a referencia oficial e a copia em public/mainframe-sample deve permanecer identica nos CSVs principais"
    - "A melhor forma de clareza pedagogica e separar campos demonstrativos dos campos reais de negocio em vez de sobrecarregar os alvos existentes"
    - "Nao ha docs/PRD.yaml no repositorio; o pedido do usuario e a fonte de verdade para este escopo"

implementation_specification:
  code_structure: |
    A nova amostra deve manter o fluxo estrutural `INPUT1 -> &&TMPIN001`,
    `INPUT2 -> &&TMPIN002`, `DB2 -> &&TMPOUT03`, `&&TMPOUT03 ->
    APP.ARQ.SAIDA.CBLDB001`, mas reorganizar a camada didatica em torno de uma
    familia de campos com prefixo `DEMO-`. Em vez de usar poucos
    campos reais para mostrar muitos conceitos, cada subtipo padronizado deve
    ter pelo menos um alvo demonstrativo proprio, com nome que indique sua
    funcao pedagogica. A convencao deve priorizar nomes curtos e simples,
    evitando descricoes longas no proprio nome do campo. A referencia final de
    execucao passa a ser a familia `DEMO-ID`, `DEMO-ORD`, `DEMO-ENR`,
    `DEMO-LKP`, `DEMO-KEY`, `DEMO-CALC`, `DEMO-DER`, `DEMO-COND`,
    `DEMO-FIXO`, `DEMO-RAW`, `DEMO-NULL1`, `DEMO-NULL2` e `DEMO-FILL`,
    consolidada no arquivo
    `docs/plan/mainframe-sample-jcldb001-taxonomia-completa/didactic-matrix.csv`.
    Em paralelo,
    deve existir uma trilha dedicada aos casos
    de null/unfilled, com pelo menos tres comportamentos distintos: campo que
    aparece no schema sem upstream real, campo que continua vazio ao ser
    propagado adiante, e campo que so fica resolvido na etapa em que recebe uma
    regra final ou uma origem real adicional. No contrato de T1, esses tres
    comportamentos devem ser registrados na coluna `null_status`, enquanto a
    coluna `rule_subtype` continua reservada apenas aos 10 subtipos
    padronizados que o viewer entende. A espinha dorsal dos campos reais
    do job deve permanecer reconhecivel, mas a narrativa principal da demo deve
    se apoiar nesses campos dedicados para que o filtro por transformacao e a
    leitura de cards fiquem imediatos.
  affected_areas:
    - generated/mainframe-extractor/JCLDB001/importar/entity_columns.csv
    - generated/mainframe-extractor/JCLDB001/importar/column_mappings.csv
    - generated/mainframe-extractor/JCLDB001/importar/transform_rules.csv
    - mainframe-lineage-viewer/public/mainframe-sample/entity_columns.csv
    - mainframe-lineage-viewer/public/mainframe-sample/column_mappings.csv
    - mainframe-lineage-viewer/public/mainframe-sample/transform_rules.csv
    - mainframe-lineage-viewer/__tests__
    - docs/mainframe-lineage-viewer-v1.md
    - docs/JCLDB001-documentacao.md
  component_details:
    - component: Matriz didatica da amostra JCLDB001
      responsibility: "Definir o inventario final de campos DEMO, a quem cada um pertence e qual subtipo ou status narrativo de null cada campo precisa representar"
      interfaces:
        - "Tabela funcional de mapeamento subtipo -> campo demonstrativo -> etapa do fluxo"
        - "Convencao de nomes curtos que deixe claro quando um campo existe so para demonstracao"
        - "Contrato persistente em docs/plan/mainframe-sample-jcldb001-taxonomia-completa/didactic-matrix.csv com `rule_subtype` restrito a taxonomia e `null_status` para a trilha null"
    - component: Bundle canonico JCLDB001
      responsibility: "Materializar a matriz didatica nos CSVs canonicos, adicionando schemas, mappings e transform_rules necessarios"
      interfaces:
        - "entity_columns.csv com os novos campos DEMO nas entidades certas"
        - "column_mappings.csv com grupos de lineage separados por exemplo"
        - "transform_rules.csv com um rule_subtype explicito para cada categoria didatica"
    - component: Amostra publica do viewer
      responsibility: "Servir exatamente os mesmos CSVs principais do bundle canonico para o botao Carregar amostra JCLDB001"
      interfaces:
        - "public/mainframe-sample como espelho fiel dos CSVs principais"
    - component: Regressao automatizada da amostra
      responsibility: "Comprovar que todos os subtipos existem na amostra e que os cenarios null/unfilled produzem os estados esperados"
      interfaces:
        - "Teste de sincronizacao entre generated e public"
        - "Teste de cobertura dos 10 subtipos padronizados"
        - "Teste de status resolved/unfilled nos campos DEMO de null"
    - component: Documentacao e roteiro de apresentacao
      responsibility: "Explicar quais campos sao demonstrativos, como navegar pela taxonomia e como contar a historia dos cenarios null/unfilled sem confundir com o fluxo real"
      interfaces:
        - "Secao atualizada no viewer doc"
        - "Nota atualizada na documentacao de JCLDB001 sobre o recorte didatico"
  dependencies:
    - component: parseCanonicalBundle
      relationship: "Consumira os CSVs remodelados e precisa continuar produzindo edges, regras e origens sinteticas HARD_CODE sem ajustes estruturais"
    - component: computeColumnFieldLineageStatus
      relationship: "Precisara refletir corretamente os campos DEMO nulos, propagados e resolvidos a partir do lineage real que a amostra fornecer"
    - component: MainframeBundlePicker
      relationship: "Continua lendo diretamente public/mainframe-sample quando o usuario clica no botao da amostra"
    - component: Transformation filter do Column-Level
      relationship: "E o principal consumidor da nova clareza didatica; cada subtipo precisa ser facilmente isolavel pelo filtro existente"
  integration_points:
    - "generated/mainframe-extractor/JCLDB001/importar permanece como bundle canonico do sample"
    - "mainframe-lineage-viewer/public/mainframe-sample e a origem efetiva usada pela UI"
    - "mainframe-lineage-viewer/__tests__/mainframeSampleSync.test.ts precisa continuar cobrindo identidade entre generated e public"
    - "mainframe-lineage-viewer/__tests__/columnFieldLineage.test.ts e o ponto natural para comprovar estados unfilled e resolved da nova trilha de null"
    - "docs/mainframe-lineage-viewer-v1.md deve descrever a taxonomia e ensinar a leitura da nova amostra"

