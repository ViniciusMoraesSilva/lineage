tasks:
  - id: T1
    title: "Definir a matriz didatica da nova amostra"
    description: |
      Projetar a nova arquitetura pedagogica da amostra JCLDB001 antes de tocar
      nos CSVs. Esta tarefa deve consolidar uma matriz simples e explicita com
      o nome de cada campo DEMO, a entidade em que ele nasce, a entidade em que
      ele termina e qual conceito ele demonstra. O desenho deve reservar ao
      menos uma trilha dedicada aos 10 subtipos padronizados e outra trilha aos
      cenarios null/unfilled, evitando misturar varios conceitos no mesmo alvo.
      Para impedir ambiguidade no contrato, a trilha null deve registrar seus
      tres cenarios em uma coluna dedicada de status narrativo e nao em
      `rule_subtype`.
      A nomenclatura final deve ser curta o suficiente para ficar legivel nos
      cards e filtros sem truncar a leitura, privilegiando siglas simples em
      vez de nomes descritivos longos.
      O resultado precisa permitir que a UI seja apresentada de forma linear:
      filtrar um subtipo, enxergar um exemplo claro; filtrar os campos nulos,
      enxergar campo laranja propagado e depois resolvido.
    wave: 1
    agent: gem-implementer
    priority: high
    status: completed
    dependencies: []
    conflicts_with: []
    context_files:
      - path: generated/mainframe-extractor/JCLDB001/importar/entity_columns.csv
        description: "Schema atual que mostra onde os campos demonstrativos podem ser inseridos"
      - path: generated/mainframe-extractor/JCLDB001/importar/column_mappings.csv
        description: "Edges atuais que hoje concentram varios conceitos em poucos campos"
      - path: docs/mainframe-lineage-viewer-v1.md
        description: "Taxonomia oficial e narrativa da amostra existente"
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 180
    focus_area: didactic-sample-design
    verification:
