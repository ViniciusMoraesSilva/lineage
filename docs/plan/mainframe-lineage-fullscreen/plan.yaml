plan_id: mainframe-lineage-fullscreen
objective: |
  Adicionar um botao de fullscreen para Table-Level Lineage e Column-Level
  Lineage, permitindo que cada visualizacao ocupe a tela inteira quando o
  usuario desejar ampliar o grafo. O fluxo deve ser simples: clicar no botao
  entra em tela cheia, o grafo se reajusta para o novo viewport e o usuario
  consegue sair com o proprio botao ou com ESC, sem quebrar o layout atual.
created_at: "2026-04-13"
created_by: gem-planner
status: completed
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 4
  risk_score: medium

tldr: |
  Plano medio em 4 tarefas e 3 waves. Primeiro criar um contrato reutilizavel
  de fullscreen para os paineis de lineage, encapsulando requestFullscreen,
  exitFullscreen, fullscreenchange, estado visual e refit do React Flow. Depois
  integrar esse comportamento separadamente em Table-Level e Column-Level,
  preservando os botoes atuais de reset e zoom. Por fim, validar em navegador
  que as duas views entram e saem de fullscreen corretamente, ampliam a area do
  grafo e continuam usaveis com ESC e reset de layout.

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "O painel entra em fullscreen, mas o React Flow mantem o zoom/layout antigo e o grafo continua pequeno"
      likelihood: medium
      impact: high
      mitigation: "Disparar fitView apos fullscreenchange e apos sair de fullscreen, com pequeno delay para garantir dimensoes finais do container"
    - scenario: "O botao funciona em uma view e diverge na outra, gerando duplicacao de comportamento e bugs de manutencao"
      likelihood: medium
      impact: medium
      mitigation: "Extrair um wrapper ou hook compartilhado para a logica de fullscreen, com contrato unico consumido por TableLineage e ColumnLineage"
    - scenario: "O navegador negar fullscreen ou o ambiente nao suportar a API, deixando a UI sem resposta"
      likelihood: low
      impact: medium
      mitigation: "Usar document.fullscreenEnabled/document.fullscreenElement, tratar Promise rejeitada e manter fallback gracioso sem quebrar o painel"
  assumptions:
    - "O escopo cobre apenas as views Table-Level Lineage e Column-Level Lineage do viewer mainframe"
    - "A Fullscreen API nativa do navegador e suficiente; nao e necessario adicionar dependencia externa"
    - "O comportamento esperado de saida com ESC segue a Fullscreen API nativa e deve ser refletido na UI"
    - "Nao existe PRD.yaml no repositorio; o pedido do usuario e a fonte de verdade para este escopo"

implementation_specification:
  code_structure: |
    A implementacao deve concentrar a logica de fullscreen em um ponto
    reutilizavel, preferencialmente um wrapper visual ou hook compartilhado para
    paines ReactFlow. Esse contrato deve receber uma ref do container, expor um
    botao de alternancia, observar o evento fullscreenchange e disparar refit do
    grafo quando a area util mudar. TableLineage e ColumnLineage devem usar esse
    contrato sobre seus containers atuais, preservando Resetar layout, Controls,
    Background e o estilo visual existente. O estado fullscreen deve alterar a
    altura do painel para viewport cheia e exibir affordance clara para sair com
    ESC ou com o proprio botao.
  affected_areas:
    - mainframe-lineage-viewer/src/components/TableLineage.tsx
    - mainframe-lineage-viewer/src/components/ColumnLineage.tsx
    - mainframe-lineage-viewer/src/components
  component_details:
    - component: Contrato compartilhado de fullscreen
      responsibility: "Encapsular requestFullscreen, exitFullscreen, sincronizacao de estado, listeners de fullscreenchange e callback de refit"
      interfaces:
        - "API para alternar fullscreen de um container especifico"
        - "Estado booleano isFullscreen para ajustar label, titulo e estilo do botao"
        - "Callback de onFullscreenChange para recalcular fitView do ReactFlow"
    - component: Table-Level Lineage
      responsibility: "Adicionar o botao de fullscreen ao painel de tabelas e ampliar o container para ocupacao total da tela"
      interfaces:
        - "Botao visivel no canto superior do painel junto aos controles atuais"
        - "Container ReactFlow capaz de expandir para viewport em fullscreen"
    - component: Column-Level Lineage
      responsibility: "Adicionar o botao de fullscreen ao painel de colunas, preservando filtros, reset e interacao com campos"
      interfaces:
        - "Botao visivel no painel sem conflitar com filtros e Resetar layout"
        - "Container ReactFlow em fullscreen com area ampliada para leitura de cards e arestas"
    - component: Validacao de experiencia
      responsibility: "Confirmar comportamento real em navegador, incluindo entrada, saida, ESC, refit e ausencia de regressao"
      interfaces:
        - "Cenarios browser-based para Table-Level e Column-Level"
  dependencies:
    - component: ReactFlow via @xyflow/react
      relationship: "Precisa receber refit/fitView quando o container muda de tamanho em fullscreen"
    - component: Fullscreen API do navegador
      relationship: "Fornece requestFullscreen, exitFullscreen, fullscreenElement, fullscreenEnabled e fullscreenchange"
    - component: ResetLayoutButton
      relationship: "Permanece disponivel no painel e deve coexistir com o novo botao de fullscreen"
  integration_points:
    - "Os containers atuais dos graficos em TableLineage e ColumnLineage ja sao wrappers posicionados relative e sao o ponto ideal para requestFullscreen"
    - "A mudanca precisa respeitar o tema claro/escuro ja aplicado aos botoes e paines"
    - "Fullscreen deve conviver com fitView, zoom, reset de layout e filtros do Column-Level"

