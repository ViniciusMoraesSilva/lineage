plan_id: mainframe-lineage-excel-classificacao-campos
objective: |
  Criar um novo Excel de classificacao no Mainframe Lineage Viewer capaz de
  responder de forma objetiva as tres perguntas de negocio pedidas para um
  bundle mainframe: quais campos vieram direto da origem, quais campos sao
  hard code ou usam hard code em algum ponto do lineage, e quais campos sao
  gerados dentro do fluxo. O novo workbook deve ser orientado a consumo de
  negocio, reutilizar o modelo ParsedLineage ja calculado pelo viewer e evitar
  que o usuario precise inferir manualmente essas respostas navegando campo a
  campo no grafo.
created_at: "2026-04-13"
created_by: gem-planner
status: completed
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 6
  risk_score: medium

tldr: |
  Plano medio em 5 tarefas e 4 waves. Primeiro fixar o contrato funcional do
  novo workbook e a regra exata de classificacao para as tres perguntas,
  resolvendo a ambiguidade de "campo gerado aqui dentro" com colunas de motivo
  e evidencia. Depois implementar um exportador dedicado que derive as listas a
  partir de columnLineageEdges, fieldRules, HARD_CODE e status resolved/unfilled
  ja existentes no viewer. Em seguida integrar a nova exportacao na UI de
  mainframe sem quebrar o Excel atual de linhagem detalhada. Por fim, cobrir o
  comportamento com testes usando a amostra JCLDB001 e atualizar a documentacao
  da feature para que a classificacao possa ser explicada e auditada.

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "A regra de classificacao de 'gerados aqui dentro' ficar ambigua e misturar campos calculados com campos ainda sem upstream resolvido"
      likelihood: medium
      impact: high
      mitigation: "Definir contrato explicito no workbook com coluna de categoria principal e coluna de motivo detalhado, distinguindo transformacao derivada de geracao local sem upstream"
    - scenario: "Campos com HARD_CODE indireto nao aparecerem na lista porque a deteccao olhar apenas a regra direta do campo selecionado"
      likelihood: medium
      impact: high
      mitigation: "Fazer BFS upstream no lineage de colunas e marcar qualquer campo que tenha HARD_CODE em qualquer ponto do caminho, inclusive por regra herdada"
    - scenario: "A exportacao nova conflitar com o Excel existente e confundir o usuario sobre qual botao usar"
      likelihood: low
      impact: medium
      mitigation: "Manter exportadores separados e rotulos claros na UI, um para linhagem detalhada e outro para classificacao executiva"
  assumptions:
    - "Nao existe docs/PRD.yaml no repositorio; o pedido do usuario e a fonte de verdade para este escopo"
    - "O novo workbook sera separado do Excel atual de linhagem detalhada, em vez de substituir a exportacao existente"
    - "A classificacao pode ser derivada apenas do modelo ParsedLineage e dos contratos atuais de HARD_CODE, transformacao padronizada e status resolved/unfilled"
    - "Campos 'vindos direto da origem' serao tratados como campos cujo caminho efetivo relevante e de copia de identidade, sem dependencia de HARD_CODE"
    - "Campos 'hard code ou usam hard code' incluirao tanto atribuicoes diretas constantes quanto qualquer alvo com HARD_CODE em algum ponto do upstream"
    - "Campos 'gerados aqui dentro' incluirao campos cujo resultado depende de transformacao local nao identitaria ou campos ainda sem upstream resolvido, com motivo detalhado no workbook"

implementation_specification:
  code_structure: |
    A implementacao deve introduzir um exportador dedicado para classificacao,
    separado do exportLineageExcel atual. Esse novo modulo deve receber
    ParsedLineage e a selecao atual de campos ou, se o produto preferir escopo
    global do JCL filtrado, operar sobre todos os campos visiveis do filteredData.
    O modulo deve construir um workbook com abas orientadas a resposta de
    negocio, por exemplo Resumo, Direto da origem, Hard code e Gerados aqui.
    A classificacao precisa reutilizar a malha de edges, fieldRules e status de
    coluna ja calculados pelo viewer, evitando duplicar a semantica de parsing.
    O botao novo deve ficar no painel de regras ou cabecalho operacional com
    rotulo explicito de classificacao, preservando o botao atual de Exportar
    Excel de linhagem detalhada. A implementacao deve priorizar funcoes puras
    reutilizaveis para: enumerar campos candidatos, percorrer upstream,
    detectar HARD_CODE indireto, consolidar categoria principal e produzir
    linhas tabulares com evidencia resumida.
  affected_areas:
    - mainframe-lineage-viewer/src/lib/mainframe/exportLineageExcel.ts
    - mainframe-lineage-viewer/src/app/mainframe/page.tsx
    - mainframe-lineage-viewer/src/lib/mainframe
    - mainframe-lineage-viewer/__tests__
    - docs/mainframe-lineage-viewer-v1.md
  component_details:
    - component: Contrato de classificacao de campos
      responsibility: "Definir criterios deterministas para responder as tres perguntas e o layout final do workbook"
      interfaces:
        - "Categoria principal por campo: direto_origem, hard_code, gerado_fluxo"
        - "Motivo detalhado por campo: copia_identidade, hard_code_direto, hard_code_indireto, calculo_derivado, derivacao_condicional, gerado_sem_upstream e similares"
        - "Colunas de evidencia resumida: dataset, campo, step, transformacao, origem_detectada e observacao"
    - component: Exportador de classificacao
      responsibility: "Construir o novo workbook XLSX a partir de ParsedLineage sem impactar o exportador atual"
      interfaces:
        - "Funcao exportClassificationExcel(data, selectedFields ou escopo global)"
        - "Abas do workbook para resumo e listas por pergunta"
        - "Nome de arquivo dedicado e distinto do Excel de linhagem"
    - component: Integracao da UI mainframe
      responsibility: "Expor um novo gatilho de exportacao e deixar claro o escopo do workbook para o usuario"
      interfaces:
        - "Botao com rotulo explicito para exportar classificacao dos campos"
        - "Mensagem ou texto de apoio explicando que o workbook responde as 3 perguntas executivas"
    - component: Regressao automatizada
      responsibility: "Garantir que as regras de classificacao nao regredem e que a amostra JCLDB001 continua sendo um fixture auditavel"
      interfaces:
        - "Teste das categorias principais e dos motivos detalhados"
        - "Teste de deteccao de HARD_CODE direto e indireto"
        - "Teste de campos sem upstream resolvido"
    - component: Documentacao do viewer
      responsibility: "Explicar como o novo Excel deve ser lido e quais criterios o classificam"
      interfaces:
        - "Secao nova ou atualizada no doc do viewer"
        - "Descricao das abas e do significado das categorias"
  dependencies:
    - component: ParsedLineage
      relationship: "Fonte de verdade para datasets, edges, fieldRules e stats que alimentam a classificacao"
    - component: HARD_CODE sintetico
      relationship: "Permite detectar hard code direto e indireto via dataset sintetico e regras constantes"
    - component: computeColumnFieldLineageStatus
      relationship: "Distingue campos com upstream resolvido de campos gerados localmente sem preenchimento de upstream"
    - component: exportLineageExcel atual
      relationship: "Serve como referencia de infraestrutura XLSX, mas nao deve ser sobreposto nem perder funcao"
    - component: MainframeRulePanel
      relationship: "Ponto natural de integracao do novo botao, pois ja concentra selecao de campos e exportacao atual"
  integration_points:
    - "mainframe-lineage-viewer/src/lib/mainframe/parseCanonicalBundle.ts ja cria transformation labels e o dataset sintetico HARD_CODE"
    - "mainframe-lineage-viewer/src/lib/columnFieldLineage.ts ja calcula status resolved/unfilled que pode alimentar a pergunta sobre campos gerados localmente"
    - "mainframe-lineage-viewer/src/app/mainframe/page.tsx ja possui selectedFields, filteredData e o botao Exportar Excel"
    - "mainframe-lineage-viewer/__tests__/mainframeSampleDidacticMatrixContract.test.ts e demais testes da amostra podem servir de fixture para a nova classificacao"

