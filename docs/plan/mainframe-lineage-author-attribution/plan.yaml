    estimated_lines: 15
    focus_area: metadata
    verification:
      - "layout.tsx declara autoria com 'Vinicius Moraes'"
      - "package.json contém campo author com 'Vinicius Moraes'"
      - "title do produto permanece 'Mainframe Lineage Viewer'"
    acceptance_criteria:
