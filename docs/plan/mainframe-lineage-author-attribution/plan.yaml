  - id: T2
    title: "Registrar Vinicius Moraes nos metadados do app"
    description: |
      Atualizar os metadados do layout e o package.json para refletir autoria
      profissional com "Vinicius Moraes". Isso inclui campos como metadata.authors,
      metadata.creator ou equivalentes e o campo author no package.json, mantendo
      o nome do produto inalterado.
    wave: 1
    agent: gem-implementer
    priority: medium
    status: pending
    dependencies: []
    conflicts_with: []
    context_files:
      - path: marquito/src/app/layout.tsx
