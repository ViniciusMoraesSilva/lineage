plan_id: mainframe-lineage-author-attribution
objective: |
  Introduzir atribuição profissional de autoria usando "Vinicius Moraes"
  sem substituir a marca principal do produto. O produto continua sendo
  "Mainframe Lineage Viewer" e a autoria aparece de forma discreta,
  séria e compatível com apresentação para stakeholders.
created_at: "2026-04-12"
created_by: gem-planner
status: completed
research_confidence: high

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 2
  risk_score: low

tldr: |
  Plano simples em 3 tarefas. Primeiro ajustar a atribuição visível no rodapé
  e os metadados do app para refletir autoria profissional com "Vinicius Moraes".
  Depois validar consistência visual, ausência de apelido na interface e build limpo.

open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "O nome pessoal ganhar mais destaque que o nome do produto"
      likelihood: low
      impact: medium
      mitigation: "Manter 'Mainframe Lineage Viewer' como branding principal e deixar a autoria apenas como crédito secundário"
    - scenario: "Atribuição ficar informal ou inconsistente com a proposta séria da aplicação"
      likelihood: low
      impact: medium
      mitigation: "Usar texto objetivo como 'Desenvolvido por Vinicius Moraes' e não expor apelidos na UI"
  assumptions:
    - "A marca principal da aplicação continuará sendo 'Mainframe Lineage Viewer'"
    - "O nome pessoal deve aparecer de forma discreta, preferencialmente no rodapé e metadados"
    - "O apelido 'monstro' não deve aparecer na interface por não combinar com a proposta séria"

implementation_specification:
  code_structure: |
    A mudança deve ser mínima e concentrada nos pontos de branding secundário.
    O nome do produto permanece no header, título e navegação. A autoria profissional
    entra no Footer e nos metadados estruturais da aplicação. Não é necessário criar
    novas páginas nem alterar a navegação.
  affected_areas:
    - marquito/src/components/Footer.tsx
    - marquito/src/app/layout.tsx
    - marquito/package.json
  component_details:
    - component: Footer
      responsibility: "Exibir crédito profissional discreto com 'Vinicius Moraes' sem competir com a marca do produto"
      interfaces:
        - "Texto secundário como 'Desenvolvido por Vinicius Moraes'"
        - "Crédito existente ao Marquito/OpenLineage preservado"
    - component: Root metadata
      responsibility: "Declarar autoria profissional nos metadados da aplicação"
      interfaces:
        - "metadata.authors ou metadata.creator com 'Vinicius Moraes'"
    - component: package.json
      responsibility: "Registrar autor do pacote de forma consistente com o branding profissional"
      interfaces:
        - "Campo author com 'Vinicius Moraes'"
  dependencies:
    - component: Footer
      relationship: "Renderizado globalmente pelo layout, impactando todas as rotas"
    - component: Root metadata
      relationship: "Usado pelo layout raiz para título e metadados do app"
  integration_points:
    - "Footer já concentra créditos de origem do projeto"
    - "layout.tsx já define metadata principal do produto"
    - "package.json já contém nome do pacote e pode receber autoria sem afetar runtime"

contracts:
  - from_task: T1
    to_task: T3
    interface: "Footer com crédito profissional de autoria"
    format: "Componente TSX"
  - from_task: T2
    to_task: T3
    interface: "Metadados e package.json atualizados com autor profissional"
    format: "TypeScript metadata e JSON"

tasks:
  - id: T1
    title: "Adicionar autoria profissional no rodapé"
    description: |
      Ajustar o Footer para incluir uma assinatura discreta e séria com
      "Vinicius Moraes", sem remover o branding principal do produto e sem
      apagar o crédito ao Marquito/OpenLineage. A autoria deve ser visualmente
      secundária ao nome "Mainframe Lineage Viewer".
    wave: 1
    agent: gem-implementer
    priority: medium
    status: pending
    dependencies: []
    conflicts_with: []
    context_files:
      - path: marquito/src/components/Footer.tsx
        description: "Rodapé atual com nome do produto e crédito ao projeto-base"
    estimated_effort: small
    estimated_files: 1
    estimated_lines: 20
    focus_area: footer-branding
    verification:
      - "Footer exibe 'Vinicius Moraes' em contexto profissional"
      - "Mainframe Lineage Viewer continua sendo o texto principal do rodapé"
      - "Crédito ao Marquito/OpenLineage permanece visível"
    acceptance_criteria:
      - "A interface não exibe o apelido 'monstro'"
      - "A autoria aparece como crédito secundário e profissional"
      - "O branding principal continua sendo do produto, não da pessoa"
    failure_modes:
      - scenario: "Rodapé fica poluído com excesso de créditos"
        likelihood: low
        impact: low
        mitigation: "Usar apenas uma linha curta e hierarquia tipográfica discreta"
    tech_stack:
