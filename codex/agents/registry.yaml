version: 1
source_dir: .github/agents
skills_dir: codex/skills
recommended_entrypoint: gem-orchestrator
notes:
  - ".github/agents remains the source of truth for legacy agent behavior."
  - "This registry maps legacy roles to Codex-native execution modes and repo-owned skills."
  - "If runtime behavior conflicts with legacy instructions, Codex runtime constraints win."

agents:
  - legacy_name: gem-orchestrator
    source: .github/agents/gem-orchestrator.agent.md
    codex_agent_type: default
    install_name: gem-orchestrator
    skill_path: codex/skills/gem-orchestrator/SKILL.md
    delegation_policy: coordinator
    entrypoint: true
    internal_only: false

